<!DOCTYPE html>
<html>
<head>
<title>JSON Object Example</title>
</head>

<body>

<h2>Person Details</h2>

<script>

var Person = {
    name: "Pratap",
    age: 20,
    city: "Satara"
};

document.write("Name: " + Person.name + "<br>");
document.write("Age: " + Person.age + "<br>");
document.write("City: " + Person.city);

</script>

</body>
</html>
