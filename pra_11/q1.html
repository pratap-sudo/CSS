<!DOCTYPE html>
<html ng-app="myApp">

<head>
    <title>Student Table</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        table {
            width: 75%;
            margin: auto;
            border-collapse: collapse;
            font-family: Arial;
        }

        th,
        td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #e6e6e6;
        }

        .odd-row {
            background-color: rgb(226, 185, 96);
        }

        .even-row {
            background-color: #f355e1;
        }
    </style>
</head>

<body ng-controller="tableCtrl">
    <h2 style="text-align:center;">Student Information</h2>
    <table>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Class</th>
            <th>Department</th>
            <th>City</th>
        </tr>
        <tr ng-repeat="s in students" ng-class-odd="'odd-row'" ng-class-even="'even-row'">
            <td>{{s.roll}}</td>
            <td>{{s.name}}</td>
            <td>{{s.class}}</td>
            <td>{{s.dept}}</td>
            <td>{{s.city}}</td>
        </tr>
    </table>
    <script>
        angular.module("myApp", [])
            .controller("tableCtrl", function ($scope) {
                $scope.students = [
                    { roll: 1, name: "Advait", class: "FY", dept: "Computer", city: "Pune" },
                    { roll: 2, name: "Pratik", class: "SY", dept: "IT", city: "Mumbai" },
                    { roll: 3, name: "Kunal", class: "TY", dept: "Mechanical", city: "Nashik" },
                    { roll: 4, name: "Shubham", class: "FY", dept: "Computer", city: "Pune" },
                    { roll: 5, name: "Rohan", class: "SY", dept: "Civil", city: "Nagpur" },
                    { roll: 6, name: "Neha", class: "TY", dept: "IT", city: "Mumbai" },
                    { roll: 7, name: "Sanket", class: "TY", dept: "Computer", city: "Solapur" },
                    { roll: 8, name: "Ajay", class: "SY", dept: "Mechanical", city: "Kolhapur" },
                    { roll: 9, name: "Vinay", class: "TY", dept: "Civil", city: "Satara" },
                    { roll: 10, name: "Meera", class: "FY", dept: "IT", city: "Aurangabad" }
                ];
            });
    </script>
</body>

</html>
