<!DOCTYPE html>
<html>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

<body ng-app="myApp">
    <h2 style="text-align:center;">Employee Data of Company</h2>
    <table ng-controller="myCtrl" border="1" align="center" cellpadding="8">
        <tr>
            <th>Employee ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Salary</th>
        </tr>
        <tr ng-repeat="x in employees">
            <td>{{x.EmpId}}</td>
            <td>{{x.Name}}</td>
            <td>{{x.Department}}</td>
            <td>{{x.Designation}}</td>
            <td>{{x.Salary}}</td>
        </tr>
    </table>
    <script>
        var app = angular.module("myApp", []);
        app.controller("myCtrl", function ($scope) {
            $scope.employees = [
                {
                    "EmpId": 101, "Name": "Sanket", "Department": "IT", "Designation": "Developer", "Salary": 35000
                },
                { "EmpId": 102, "Name": "Rohit", "Department": "HR", "Designation": "Manager", "Salary": 42000 },
                { "EmpId": 103, "Name": "Sneha", "Department": "IT", "Designation": "Tester", "Salary": 30000 },
                { "EmpId": 104, "Name": "Pooja", "Department": "Sales", "Designation": "Executive", "Salary": 28000 },
                { "EmpId": 105, "Name": "Rahul", "Department": "IT", "Designation": "Designer", "Salary": 32000 }
            ];
        });
    </script>
</body>

</html>
